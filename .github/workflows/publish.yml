name: Publish GitHub Packages

on:
  workflow_run:
    workflows:
      - Prepare GitHub Packages release artifacts
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: publish-github-packages-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  verify-release-authorization:
    name: Verify publishing environment requires reviewer approval
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: 'INFO: Checkout trusted release authorization tooling'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: 'INFO: Set up Node.js 22'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: 'INFO: Verify publishing environment and v* release-tag protection rules'
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_ENVIRONMENT: tinyfy-private-package-publish
          RELEASE_MAINTAINER_TEAM: release-maintainers
        run: |
          environment_file="$(mktemp)"
          rulesets_file="$(mktemp)"
          release_maintainer_team_file="$(mktemp)"
          ruleset_details_dir="$(mktemp -d)"
          trap 'rm -f "${environment_file}" "${rulesets_file}" "${release_maintainer_team_file}"; rm -rf "${ruleset_details_dir}"' EXIT
          echo "[DEBUG] Reading protection rules for ${PUBLISH_ENVIRONMENT}."

          if ! gh api "repos/${GITHUB_REPOSITORY}/environments/${PUBLISH_ENVIRONMENT}" > "${environment_file}"; then
            echo "[ERROR] Could not read protection rules for ${PUBLISH_ENVIRONMENT}." >&2
            exit 1
          fi

          echo '[DEBUG] Reading repository tag rulesets.'
          if ! gh api --paginate "repos/${GITHUB_REPOSITORY}/rulesets?per_page=100" > "${rulesets_file}"; then
            echo '[ERROR] Could not read repository rulesets for release-tag verification.' >&2
            exit 1
          fi

          echo "[DEBUG] Resolving the ${RELEASE_MAINTAINER_TEAM} release-maintainer team."
          if ! gh api "orgs/${GITHUB_REPOSITORY_OWNER}/teams/${RELEASE_MAINTAINER_TEAM}" > "${release_maintainer_team_file}"; then
            echo "[ERROR] Could not resolve the ${RELEASE_MAINTAINER_TEAM} team for release-tag verification." >&2
            exit 1
          fi

          ruleset_count=0
          while IFS= read -r ruleset_id; do
            ruleset_count=$((ruleset_count + 1))
            ruleset_file="${ruleset_details_dir}/${ruleset_id}.json"
            echo "[DEBUG] Reading detail for repository ruleset ${ruleset_id}."

            if ! gh api "repos/${GITHUB_REPOSITORY}/rulesets/${ruleset_id}" > "${ruleset_file}"; then
              echo "[ERROR] Could not read repository ruleset ${ruleset_id} for release-tag verification." >&2
              exit 1
            fi
          done < <(jq -r '.[]? | .id? // empty' "${rulesets_file}")

          if [ "${ruleset_count}" -eq 0 ]; then
            echo '[ERROR] An active v* tag ruleset is required before publishing.' >&2
            exit 1
          fi

          if ! LOG_LEVEL=debug \
            PUBLISH_ENVIRONMENT="${PUBLISH_ENVIRONMENT}" \
            RELEASE_MAINTAINER_TEAM="${RELEASE_MAINTAINER_TEAM}" \
            node scripts/verify-release-authorization.mjs \
              "${environment_file}" \
              "${release_maintainer_team_file}" \
              "${ruleset_details_dir}"; then
            echo '[ERROR] Publishing environment or v* release-tag authorization verification failed.' >&2
            exit 1
          fi

          echo '[INFO] Publishing environment and v* release-tag protection rules are authorized.'

  publish:
    name: Publish validated private packages
    needs: verify-release-authorization
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    environment: tinyfy-private-package-publish
    runs-on: ubuntu-latest

    steps:
      - name: 'INFO: Checkout trusted release tooling'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: 'INFO: Set up Node.js 22'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: 'INFO: Download release artifacts'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: github-packages-release-artifacts
          path: ${{ runner.temp }}/github-packages-release-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: 'INFO: Verify release artifacts'
        env:
          RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          if ! LOG_LEVEL=debug node scripts/verify-publish-artifacts.mjs \
            "${RUNNER_TEMP}/github-packages-release-artifacts" \
            "${RELEASE_TAG}"; then
            echo '[ERROR] Release artifact verification failed.' >&2
            exit 1
          fi
          echo '[INFO] Release artifacts passed trusted verification.'

      - name: 'INFO: Verify administrator registry-credential attestation'
        env:
          TINYFY_PACKAGES_TOKEN_SCOPE_ATTESTATION: ${{ vars.TINYFY_PACKAGES_TOKEN_SCOPE_ATTESTATION }}
        run: |
          if [ "${TINYFY_PACKAGES_TOKEN_SCOPE_ATTESTATION:-}" != 'i-prikot-three-package-writes-only' ]; then
            echo '[ERROR] Publishing is blocked until an i-prikot administrator sets the tinyfy-private-package-publish environment variable TINYFY_PACKAGES_TOKEN_SCOPE_ATTESTATION to i-prikot-three-package-writes-only after verifying the environment-only token and its exact package-write scope.' >&2
            exit 1
          fi

          echo '[INFO] Environment-scoped administrator attestation is present.'
      - name: 'INFO: Publish validated private @i-prikot packages'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TINYFY_PACKAGES_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo '[ERROR] TINYFY_PACKAGES_TOKEN is not configured with write access for @i-prikot packages.' >&2
            exit 1
          fi

          artifact_dir="${RUNNER_TEMP}/github-packages-release-artifacts"
          publish_dir="${RUNNER_TEMP}/github-packages-publish"
          publish_npmrc="${publish_dir}/npmrc"
          umask 077
          rm -rf "${publish_dir}"
          mkdir -p "${publish_dir}"
          trap 'rm -rf "${publish_dir}"' EXIT
          printf '%s\n' \
            '@i-prikot:registry=https://npm.pkg.github.com' \
            "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > "${publish_npmrc}"

          publish_archive() {
            archive_name="$1"
            package_name="$2"
            package_version="$3"
            npm_view_error_file="${publish_dir}/npm-view-${archive_name}.log"

            echo "[DEBUG] Checking whether ${package_name}@${package_version} is already published."
            if published_version="$(
              (
                cd "${publish_dir}"
                NPM_CONFIG_USERCONFIG="${publish_npmrc}" \
                  NPM_CONFIG_GLOBALCONFIG=/dev/null \
                  npm view "${package_name}@${package_version}" version \
                    --registry=https://npm.pkg.github.com
              ) 2>"${npm_view_error_file}"
            )"; then
              if [ "${published_version}" != "${package_version}" ]; then
                echo "[ERROR] Registry returned ${published_version:-<missing>} for ${package_name}@${package_version}." >&2
                exit 1
              fi
              echo "[INFO] Skipping ${archive_name}; ${package_name}@${package_version} is already published."
              return
            fi

            if ! grep -q 'E404' "${npm_view_error_file}"; then
              echo "[ERROR] Registry lookup failed for ${package_name}@${package_version}; refusing to publish." >&2
              exit 1
            fi

            rm -f "${npm_view_error_file}"
            echo "[DEBUG] Publishing validated archive ${archive_name}."
            if ! (
              cd "${publish_dir}"
              NPM_CONFIG_USERCONFIG="${publish_npmrc}" \
                NPM_CONFIG_GLOBALCONFIG=/dev/null \
                npm publish --ignore-scripts \
                  --registry=https://npm.pkg.github.com \
                  "${artifact_dir}/${archive_name}"
            ); then
              echo "[ERROR] Publish failed for ${archive_name}." >&2
              exit 1
            fi
            echo "[INFO] Published ${archive_name}."
          }

          release_version="${RELEASE_TAG#v}"
          publish_archive "i-prikot-editor-schema-${release_version}.tgz" '@i-prikot/editor-schema' "${release_version}"
          publish_archive "i-prikot-editor-${release_version}.tgz" '@i-prikot/editor' "${release_version}"
          publish_archive "i-prikot-renderer-${release_version}.tgz" '@i-prikot/renderer' "${release_version}"
